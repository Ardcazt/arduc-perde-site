# Arduç Perde - Netlify ayarları
# Git ile yayınlarsanız bu ayarlar otomatik kullanılır.

[build]
  publish = "."
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

# İsteğe bağlı: 404 sayfası
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
